<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoom Camera</title>
    
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a0e27;
            --accent: #00ff88;
            --danger: #ff3366;
            --surface: #1a1f3a;
            --text: #e8eaf6;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #0f1629 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .screen { display: none; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin: 30px 0; }
        
        h1 { 
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem; 
            margin-bottom: 10px; 
            color: var(--accent); 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .card {
            background: rgba(26, 31, 58, 0.8);
            border-radius: 24px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .btn-primary { background: var(--accent); color: var(--primary); }
        .btn-secondary { background: var(--surface); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-danger { background: var(--danger); color: white; }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: var(--surface);
            border: 2px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 5px;
            margin: 10px 0;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: black;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            transform: scaleX(-1);
        }
        
        video.rear-cam { transform: scaleX(1); }

        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .control-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .control-btn.off { background: var(--danger); color: white; }
        .control-btn.danger { background: var(--danger); }
        .control-btn.talking { background: var(--accent); animation: talkPulse 0.8s infinite; }

        @keyframes talkPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.5); }
            50% { box-shadow: 0 0 0 10px rgba(0,255,136,0); }
        }

        .code-display {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent);
            text-align: center;
            letter-spacing: 5px;
            font-family: monospace;
            margin: 20px 0;
        }

        #unmuteBtn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid white;
            z-index: 10;
            cursor: pointer;
            display: none;
        }
        
        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 5;
        }
        
        .dot { width: 8px; height: 8px; background: red; border-radius: 50%; }
        .dot.live { background: #00ff88; box-shadow: 0 0 10px #00ff88; }

        /* Reconnect overlay */
        #reconnectOverlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border-radius: 20px;
            text-align: center;
            padding: 20px;
        }
        #reconnectOverlay.visible { display: flex; }
        #reconnectOverlay .reconnect-icon { font-size: 3rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }
        #reconnectOverlay p { color: #ccc; font-size: 1rem; }
        #reconnectOverlay strong { color: white; font-size: 1.2rem; }
        .btn-reconnect {
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 50px;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            margin-top: 6px;
        }
        .btn-reconnect:active { transform: scale(0.97); }
        .btn-reconnect.loading { opacity: 0.6; pointer-events: none; }
        
    </style>
</head>
<body>

<div class="container">
    
    <!-- HOME SCREEN -->
    <div id="homeScreen" class="screen active">
        <div class="header">
            <div style="font-size: 4rem;">📹</div>
            <h1>Zoom Camera</h1>
        </div>
        <div class="card">
            <button class="btn btn-primary" onclick="app.startViewing()">👁️ אני רוצה לצפות</button>
            <button class="btn btn-secondary" onclick="app.startStreaming()">📷 אני רוצה לשדר (מצלמה)</button>
        </div>
    </div>

    <!-- VIEWING SCREEN -->
    <div id="viewingScreen" class="screen">
        <div class="header">
            <h1>מסך צפייה</h1>
            <p>תן את הקוד למכשיר המשדר</p>
        </div>

        <div class="card" id="codeCard">
            <div class="code-display" id="viewerCode">...</div>
            <div style="text-align: center; color: #999; margin-bottom: 20px;">ממתין לחיבור...</div>
            <button class="btn btn-secondary" onclick="app.goHome()">חזור</button>
        </div>

        <div id="viewerVideoContainer" class="card" style="display:none;">
            <div class="video-container">
                <div class="status-badge"><div class="dot live"></div>שידור חי</div>
                <video id="viewerVideo" autoplay playsinline muted></video>
                <button id="unmuteBtn" onclick="app.unmuteVideo()">🔇 לחץ להפעלת שמע</button>
                <div id="reconnectOverlay">
                    <div class="reconnect-icon">📡</div>
                    <strong>השידור הופסק</strong>
                    <p>החיבור עם המשדר נקטע</p>
                    <button class="btn-reconnect" id="reconnectBtn" onclick="app.reconnect()">
                        🔄 רענן שידור
                    </button>
                    <button onclick="app.goHome()" style="background:none;border:none;color:#888;cursor:pointer;margin-top:4px;font-size:0.9rem;">יציאה</button>
                </div>
            </div>
            
            <div class="controls">
                <button id="btnCam" class="control-btn" onclick="app.remoteToggleCamera()">📷</button>
                <button id="btnMic" class="control-btn" onclick="app.remoteToggleMic()">🎤</button>
                <button id="btnSwitch" class="control-btn" onclick="app.remoteSwitchCamera()">🔄</button>
                <button id="btnViewerMic" class="control-btn" onclick="app.toggleViewerMic()">🗣️</button>
                <button class="control-btn danger" onclick="app.disconnect()">❌</button>
            </div>
        </div>
    </div>

    <!-- STREAMING SCREEN -->
    <div id="streamingScreen" class="screen">
        <div class="header">
            <h1>מסך שידור</h1>
            <p>הכנס את הקוד שמופיע במכשיר הצופה</p>
        </div>

        <div class="card" id="connectCard">
            <div class="input-group">
                <input type="number" id="connectCode" placeholder="0000" oninput="if(this.value.length==4) app.connectToViewer()">
            </div>
            <button class="btn btn-primary" onclick="app.connectToViewer()">התחבר</button>
            <button class="btn btn-secondary" onclick="app.goHome()">חזור</button>
        </div>

        <div id="streamerVideoContainer" class="card" style="display:none;">
            <div class="video-container">
                <div class="status-badge"><div class="dot live"></div>משדר כעת</div>
                <video id="streamerVideo" autoplay playsinline muted></video>
            </div>
        </div>
    </div>

</div>

<script>
    const app = {
        peer: null,
        conn: null,
        currentCall: null,
        localStream: null,       // stream of the streamer's camera
        viewerStream: null,      // stream of the viewer's microphone
        viewerBackCall: null,    // back-channel call from viewer to streamer
        peerIdPrefix: 'secure-cam-app-',

        // states
        camEnabled: true,
        micEnabled: true,
        viewerMicEnabled: false,
        currentFacingMode: 'environment',

        // reconnect helpers
        viewerCode: null,
        streamDroppedByUser: false,
        streamCheckInterval: null,

        init() {
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(console.error);
            }
        },

        showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        },

        goHome() {
            this.streamDroppedByUser = true;
            clearInterval(this.streamCheckInterval);

            // stop all local media tracks
            if (this.localStream) {
                this.localStream.getTracks().forEach(t => t.stop());
                this.localStream = null;
            }
            if (this.viewerStream) {
                this.viewerStream.getTracks().forEach(t => t.stop());
                this.viewerStream = null;
            }

            if (this.peer) {
                this.peer.destroy();
                this.peer = null;
            }
            this.conn = null;
            this.currentCall = null;
            this.viewerBackCall = null;
            this.viewerMicEnabled = false;

            // reset viewer side DOM
            document.getElementById('codeCard').style.display = 'block';
            document.getElementById('viewerVideoContainer').style.display = 'none';
            document.getElementById('reconnectOverlay').classList.remove('visible');

            // reset streamer side DOM
            document.getElementById('connectCard').style.display = 'block';
            document.getElementById('streamerVideoContainer').style.display = 'none';
            document.getElementById('connectCode').value = '';

            this.showScreen('homeScreen');
        },

        // ─── VIEWER LOGIC ────────────────────────────────────────────────────────

        startViewing() {
            this.showScreen('viewingScreen');
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            this.viewerCode = code;
            this.streamDroppedByUser = false;
            this.viewerMicEnabled = false;
            document.getElementById('viewerCode').innerText = code;

            this.camEnabled = true;
            this.micEnabled = true;
            this.updateButtonsUI();

            this.peer = new Peer(this.peerIdPrefix + code);

            this.peer.on('open', () => console.log('Viewer ready, code:', code));

            this.peer.on('connection', (conn) => {
                this.conn = conn;
                document.getElementById('codeCard').style.display = 'none';
                document.getElementById('viewerVideoContainer').style.display = 'block';
                document.getElementById('reconnectOverlay').classList.remove('visible');

                conn.on('data', (data) => this.handleViewerCommand(data));
                conn.on('close', () => {
                    if (!this.streamDroppedByUser) this.showReconnectOverlay();
                });
            });

            this.peer.on('call', (call) => {
                call.answer();
                call.on('stream', (remoteStream) => {
                    const video = document.getElementById('viewerVideo');
                    video.srcObject = remoteStream;
                    video.play().catch(() => {});
                    document.getElementById('unmuteBtn').style.display = 'block';
                    document.getElementById('reconnectOverlay').classList.remove('visible');
                    const dot = document.querySelector('#viewerVideoContainer .dot');
                    if (dot) dot.classList.add('live');
                    this.startStreamHealthCheck(remoteStream);
                });
                call.on('close', () => {
                    if (!this.streamDroppedByUser) this.showReconnectOverlay();
                });
                call.on('error', () => {
                    if (!this.streamDroppedByUser) this.showReconnectOverlay();
                });
            });

            this.peer.on('error', () => {
                if (!this.streamDroppedByUser) this.showReconnectOverlay();
            });
        },

        // command handler on viewer side (receives commands from streamer)
        handleViewerCommand(data) {
            // streamer turned on his mic → turn off viewer mic
            if (data.type === 'streamerMicOn') {
                if (this.viewerMicEnabled) {
                    this.stopViewerMic();
                }
            }
        },

        // toggle viewer's own microphone
        async toggleViewerMic() {
            if (this.viewerMicEnabled) {
                this.stopViewerMic();
            } else {
                await this.startViewerMic();
            }
        },

        async startViewerMic() {
            try {
                this.viewerStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err) {
                alert('חובה לאשר גישה למיקרופון!');
                return;
            }

            // send audio to streamer via a new call back
            if (this.peer && this.conn) {
                const backCall = this.peer.call(this.conn.peer, this.viewerStream);
                this.viewerBackCall = backCall;
            }

            this.viewerMicEnabled = true;
            // notify streamer to mute his mic
            if (this.conn) this.conn.send({ type: 'viewerMicOn' });
            this.updateButtonsUI();
        },

        stopViewerMic() {
            if (this.viewerStream) {
                this.viewerStream.getTracks().forEach(t => t.stop());
                this.viewerStream = null;
            }
            if (this.viewerBackCall) {
                try { this.viewerBackCall.close(); } catch(e) {}
                this.viewerBackCall = null;
            }
            this.viewerMicEnabled = false;
            // notify streamer that viewer mic is off
            if (this.conn) this.conn.send({ type: 'viewerMicOff' });
            this.updateButtonsUI();
        },

        unmuteVideo() {
            document.getElementById('viewerVideo').muted = false;
            document.getElementById('unmuteBtn').style.display = 'none';
        },

        startStreamHealthCheck(stream) {
            clearInterval(this.streamCheckInterval);
            this.streamCheckInterval = setInterval(() => {
                const tracks = stream.getVideoTracks();
                if (tracks.length === 0 || tracks[0].readyState === 'ended') {
                    if (!this.streamDroppedByUser) this.showReconnectOverlay();
                    clearInterval(this.streamCheckInterval);
                }
            }, 3000);
        },

        showReconnectOverlay() {
            document.getElementById('reconnectOverlay').classList.add('visible');
            const dot = document.querySelector('#viewerVideoContainer .dot');
            if (dot) dot.classList.remove('live');
        },

        reconnect() {
            const btn = document.getElementById('reconnectBtn');
            btn.classList.add('loading');
            btn.textContent = '⏳ מתחבר...';

            clearInterval(this.streamCheckInterval);

            // stop viewer mic if active
            if (this.viewerStream) {
                this.viewerStream.getTracks().forEach(t => t.stop());
                this.viewerStream = null;
            }
            if (this.viewerBackCall) {
                try { this.viewerBackCall.close(); } catch(e) {}
                this.viewerBackCall = null;
            }
            this.viewerMicEnabled = false;

            if (this.peer) {
                try { this.peer.destroy(); } catch(e) {}
                this.peer = null;
                this.conn = null;
                this.currentCall = null;
            }

            setTimeout(() => {
                this.streamDroppedByUser = false;
                this.camEnabled = true;
                this.micEnabled = true;
                this.updateButtonsUI();

                const newCode = Math.floor(1000 + Math.random() * 9000).toString();
                this.viewerCode = newCode;
                document.getElementById('viewerCode').innerText = newCode;

                // show code card so streamer can reconnect with new code
                document.getElementById('reconnectOverlay').classList.remove('visible');
                document.getElementById('codeCard').style.display = 'block';
                document.getElementById('viewerVideoContainer').style.display = 'none';
                document.getElementById('unmuteBtn').style.display = 'none';
                document.getElementById('viewerVideo').srcObject = null;
                const dotReset = document.querySelector('#viewerVideoContainer .dot');
                if (dotReset) dotReset.classList.remove('live');

                btn.classList.remove('loading');
                btn.textContent = '🔄 רענן שידור';

                this.peer = new Peer(this.peerIdPrefix + newCode);

                this.peer.on('open', () => console.log('Viewer reconnected, new code:', newCode));

                this.peer.on('connection', (conn) => {
                    this.conn = conn;
                    document.getElementById('codeCard').style.display = 'none';
                    document.getElementById('viewerVideoContainer').style.display = 'block';
                    document.getElementById('reconnectOverlay').classList.remove('visible');
                    const dot = document.querySelector('#viewerVideoContainer .dot');
                    if (dot) dot.classList.add('live');
                    conn.on('data', (data) => this.handleViewerCommand(data));
                    conn.on('close', () => {
                        if (!this.streamDroppedByUser) this.showReconnectOverlay();
                    });
                });

                this.peer.on('call', (call) => {
                    call.answer();
                    call.on('stream', (remoteStream) => {
                        const video = document.getElementById('viewerVideo');
                        video.srcObject = remoteStream;
                        video.muted = true;
                        video.play().catch(() => {});
                        document.getElementById('unmuteBtn').style.display = 'block';
                        document.getElementById('reconnectOverlay').classList.remove('visible');
                        const dot = document.querySelector('#viewerVideoContainer .dot');
                        if (dot) dot.classList.add('live');
                        this.startStreamHealthCheck(remoteStream);
                    });
                    call.on('close', () => {
                        if (!this.streamDroppedByUser) this.showReconnectOverlay();
                    });
                });

                this.peer.on('error', () => {
                    btn.classList.remove('loading');
                    btn.textContent = '🔄 רענן שידור';
                    if (!this.streamDroppedByUser) this.showReconnectOverlay();
                });
            }, 800);
        },

        // ─── STREAMER LOGIC ───────────────────────────────────────────────────────

        startStreaming() {
            this.showScreen('streamingScreen');
        },

        async connectToViewer() {
            const code = document.getElementById('connectCode').value;
            if (code.length !== 4) return;

            try {
                this.localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: this.currentFacingMode },
                    audio: true
                });
                this.updateStreamerVideo();
            } catch (err) {
                alert('חובה לאשר גישה למצלמה ולמיקרופון!');
                return;
            }

            this.peer = new Peer();

            this.peer.on('open', () => {
                const viewerId = this.peerIdPrefix + code;
                let connected = false;

                this.conn = this.peer.connect(viewerId);

                const connectionTimeout = setTimeout(() => {
                    if (!connected) {
                        alert('אין שיחה פעילה עם קוד כזה כרגע');
                        this.goHome();
                    }
                }, 3000);

                this.conn.on('open', () => {
                    connected = true;
                    clearTimeout(connectionTimeout);

                    document.getElementById('connectCard').style.display = 'none';
                    document.getElementById('streamerVideoContainer').style.display = 'block';

                    this.currentCall = this.peer.call(viewerId, this.localStream);

                    this.conn.on('data', (data) => this.handleRemoteCommand(data));
                    this.conn.on('close', () => {
                        alert('השידור הופסק על ידי הצופה');
                        this.goHome();
                    });
                });

                this.peer.on('error', () => {
                    clearTimeout(connectionTimeout);
                    alert('אין שיחה פעילה עם קוד כזה כרגע');
                    this.goHome();
                });

                // listen for incoming call from viewer (viewer's microphone back-channel)
                this.peer.on('call', (incomingCall) => {
                    incomingCall.answer(); // no stream needed from streamer side here
                    incomingCall.on('stream', (viewerAudioStream) => {
                        // play viewer's audio through a hidden audio element
                        let audioEl = document.getElementById('viewerAudioPlayback');
                        if (!audioEl) {
                            audioEl = document.createElement('audio');
                            audioEl.id = 'viewerAudioPlayback';
                            audioEl.autoplay = true;
                            document.body.appendChild(audioEl);
                        }
                        audioEl.srcObject = viewerAudioStream;
                    });
                    this.viewerBackCall = incomingCall;
                });
            });
        },

        updateStreamerVideo() {
            const video = document.getElementById('streamerVideo');
            video.srcObject = this.localStream;
            if (this.currentFacingMode === 'user') {
                video.classList.remove('rear-cam');
            } else {
                video.classList.add('rear-cam');
            }
        },

        // ─── REMOTE CONTROLS & UI ────────────────────────────────────────────────

        remoteToggleCamera() {
            if (this.conn) {
                this.conn.send({ type: 'toggleVideo' });
                this.camEnabled = !this.camEnabled;
                this.updateButtonsUI();
            }
        },

        remoteToggleMic() {
            if (this.conn) {
                this.micEnabled = !this.micEnabled;
                this.conn.send({ type: 'toggleAudio' });
                // if streamer mic just turned ON, tell viewer to stop his mic
                if (this.micEnabled) {
                    this.conn.send({ type: 'streamerMicOn' });
                }
                this.updateButtonsUI();
            }
        },

        remoteSwitchCamera() {
            if (this.conn) {
                this.conn.send({ type: 'switchCamera' });
            }
        },

        updateButtonsUI() {
            const btnCam = document.getElementById('btnCam');
            const btnMic = document.getElementById('btnMic');
            const btnViewerMic = document.getElementById('btnViewerMic');

            if (btnCam) {
                btnCam.className = this.camEnabled ? 'control-btn' : 'control-btn off';
                btnCam.innerText = this.camEnabled ? '📷' : '🚫';
            }
            if (btnMic) {
                btnMic.className = this.micEnabled ? 'control-btn' : 'control-btn off';
                btnMic.innerText = this.micEnabled ? '🎤' : '🔇';
            }
            if (btnViewerMic) {
                btnViewerMic.className = this.viewerMicEnabled ? 'control-btn talking' : 'control-btn';
                btnViewerMic.innerText = this.viewerMicEnabled ? '🎙️' : '🗣️';
            }
        },

        // ─── COMMAND HANDLER (Streamer Side) ─────────────────────────────────────

        async handleRemoteCommand(data) {
            // toggle streamer's video
            if (data.type === 'toggleVideo') {
                this.camEnabled = !this.camEnabled;
                const videoTrack = this.localStream && this.localStream.getVideoTracks()[0];
                if (videoTrack) videoTrack.enabled = this.camEnabled;
            }

            // toggle streamer's audio
            if (data.type === 'toggleAudio') {
                this.micEnabled = !this.micEnabled;
                const audioTrack = this.localStream && this.localStream.getAudioTracks()[0];
                if (audioTrack) audioTrack.enabled = this.micEnabled;
            }

            // switch camera
            if (data.type === 'switchCamera') {
                await this.performCameraSwitch();
            }

            // viewer turned on mic → mute streamer's mic automatically
            if (data.type === 'viewerMicOn') {
                if (this.micEnabled) {
                    this.micEnabled = false;
                    const audioTrack = this.localStream && this.localStream.getAudioTracks()[0];
                    if (audioTrack) audioTrack.enabled = false;
                    this.updateButtonsUI();
                }
            }

            // viewer turned off mic → no action needed, streamer can turn mic on manually
            // (handled by remoteToggleMic from viewer side)
        },

        async performCameraSwitch() {
            this.currentFacingMode = (this.currentFacingMode === 'user') ? 'environment' : 'user';

            this.localStream.getTracks().forEach(t => t.stop());

            try {
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: this.currentFacingMode },
                    audio: true
                });

                const newVideoTrack = newStream.getVideoTracks()[0];
                const newAudioTrack = newStream.getAudioTracks()[0];

                if (newAudioTrack) newAudioTrack.enabled = this.micEnabled;
                if (newVideoTrack) newVideoTrack.enabled = this.camEnabled;

                this.localStream = newStream;
                this.updateStreamerVideo();

                if (this.currentCall && this.currentCall.peerConnection) {
                    const senders = this.currentCall.peerConnection.getSenders();
                    const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                    if (videoSender) videoSender.replaceTrack(newVideoTrack);
                    const audioSender = senders.find(s => s.track && s.track.kind === 'audio');
                    if (audioSender) audioSender.replaceTrack(newAudioTrack);
                }
            } catch (err) {
                console.error('Error switching camera:', err);
                alert('לא ניתן להחליף מצלמה (אולי היא בשימוש?)');
            }
        },

        // ─── DISCONNECT ───────────────────────────────────────────────────────────

        disconnect() {
            this.streamDroppedByUser = true;
            clearInterval(this.streamCheckInterval);
            if (this.localStream) {
                this.localStream.getTracks().forEach(t => t.stop());
                this.localStream = null;
            }
            if (this.viewerStream) {
                this.viewerStream.getTracks().forEach(t => t.stop());
                this.viewerStream = null;
            }
            if (this.peer) {
                this.peer.destroy();
                this.peer = null;
            }
            this.conn = null;
            this.currentCall = null;
            this.viewerBackCall = null;
            window.location.reload();
        }
    };

    app.init();
</script>
</body>
</html>
