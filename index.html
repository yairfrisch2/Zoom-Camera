<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoom Camera</title>
    
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a0e27;
            --accent: #00ff88;
            --danger: #ff3366;
            --surface: #1a1f3a;
            --text: #e8eaf6;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #0f1629 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .screen { display: none; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin: 30px 0; }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card {
            background: rgba(26, 31, 58, 0.8);
            border-radius: 24px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .btn-primary { background: var(--accent); color: var(--primary); }
        .btn-secondary { background: var(--surface); color: white; border: 1px solid rgba(255,255,255,0.2); }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: var(--surface);
            border: 2px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 5px;
            margin: 10px 0;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: black;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            transform: scaleX(-1);
        }

        video.rear-cam { transform: scaleX(1); }

        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .control-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .control-btn.off { background: var(--danger); }
        .control-btn.danger { background: var(--danger); }
        .control-btn.talking { background: var(--accent); animation: talkPulse 0.8s infinite; }
        .control-btn.refreshing { opacity: 0.5; pointer-events: none; animation: spin 1s linear infinite; }

        @keyframes talkPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.5); }
            50% { box-shadow: 0 0 0 10px rgba(0,255,136,0); }
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .code-display {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent);
            text-align: center;
            letter-spacing: 5px;
            font-family: monospace;
            margin: 20px 0;
        }

        #unmuteBtn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid white;
            z-index: 10;
            cursor: pointer;
            display: none;
            white-space: nowrap;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 5;
        }

        .dot { width: 8px; height: 8px; background: red; border-radius: 50%; }
        .dot.live { background: #00ff88; box-shadow: 0 0 10px #00ff88; }

        /* Dropped overlay — stream disconnected */
        #droppedOverlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.80);
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-radius: 20px;
            text-align: center;
            padding: 20px;
        }
        #droppedOverlay.visible { display: flex; }
        #droppedOverlay p { color: #ccc; font-size: 0.95rem; }

        /* Connecting overlay — shown while waiting for streamer to join */
        #connectingOverlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border-radius: 20px;
            text-align: center;
            padding: 20px;
        }
        #connectingOverlay.visible { display: flex; }
        #connectingOverlay .spin-icon { font-size: 2.5rem; animation: spin 1.2s linear infinite; }
        #connectingOverlay p { color: #ccc; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">

    <!-- HOME -->
    <div id="homeScreen" class="screen active">
        <div class="header">
            <div style="font-size:4rem;">📹</div>
            <h1>Zoom Camera</h1>
        </div>
        <div class="card">
            <button class="btn btn-primary" onclick="app.startViewing()">👁️ אני רוצה לצפות</button>
            <button class="btn btn-secondary" onclick="app.startStreaming()">📷 אני רוצה לשדר (מצלמה)</button>
        </div>
    </div>

    <!-- VIEWING -->
    <div id="viewingScreen" class="screen">
        <div class="header">
            <h1>מסך צפייה</h1>
            <p>תן את הקוד למכשיר המשדר</p>
        </div>

        <div class="card" id="codeCard">
            <div class="code-display" id="viewerCode">...</div>
            <div style="text-align:center;color:#999;margin-bottom:20px;">ממתין לחיבור...</div>
            <button class="btn btn-secondary" onclick="app.goHome()">חזור</button>
        </div>

        <div id="viewerVideoContainer" class="card" style="display:none;">
            <div class="video-container">
                <div class="status-badge"><div class="dot" id="liveDot"></div>שידור חי</div>
                <video id="viewerVideo" autoplay playsinline muted></video>
                <button id="unmuteBtn" onclick="app.unmuteVideo()">🔇 לחץ להפעלת שמע</button>
                <!-- overlay: stream dropped -->
                <div id="droppedOverlay">
                    <div style="font-size:2.5rem;">📡</div>
                    <strong style="color:white;">השידור נקטע</strong>
                    <p>לחץ רענון כדי להתחבר מחדש</p>
                </div>
                <!-- overlay: refresh in progress -->
                <div id="connectingOverlay">
                    <div class="spin-icon">🔄</div>
                    <strong style="color:white;">מרענן שידור...</strong>
                    <p>ממתין לתגובת המשדר</p>
                </div>
            </div>

            <div class="controls">
                <button id="btnCam"       class="control-btn" onclick="app.remoteToggleCamera()">📷</button>
                <button id="btnMic"       class="control-btn" onclick="app.remoteToggleMic()">🎤</button>
                <button id="btnSwitch"    class="control-btn" onclick="app.remoteSwitchCamera()">🔄</button>
                <button id="btnViewerMic" class="control-btn" onclick="app.toggleViewerMic()">🗣️</button>
                <button id="btnRefresh"   class="control-btn" onclick="app.requestStreamRefresh()" title="רענן שידור">↺</button>
                <button class="control-btn danger" onclick="app.disconnect()">❌</button>
            </div>
        </div>
    </div>

    <!-- STREAMING -->
    <div id="streamingScreen" class="screen">
        <div class="header">
            <h1>מסך שידור</h1>
            <p>הכנס את הקוד שמופיע במכשיר הצופה</p>
        </div>

        <div class="card" id="connectCard">
            <div class="input-group">
                <input type="number" id="connectCode" placeholder="0000"
                       oninput="if(this.value.length===4) app.connectToViewer()">
            </div>
            <button class="btn btn-primary" onclick="app.connectToViewer()">התחבר</button>
            <button class="btn btn-secondary" onclick="app.goHome()">חזור</button>
        </div>

        <div id="streamerVideoContainer" class="card" style="display:none;">
            <div class="video-container">
                <div class="status-badge"><div class="dot live"></div>משדר כעת</div>
                <video id="streamerVideo" autoplay playsinline muted></video>
            </div>
        </div>
    </div>

</div>

<script>
    const app = {
        // PeerJS objects
        peer: null,
        conn: null,
        currentCall: null,

        // media streams
        localStream: null,      // streamer camera/mic
        viewerStream: null,     // viewer mic
        viewerBackCall: null,   // back-channel call: viewer → streamer audio

        peerIdPrefix: 'secure-cam-app-',

        // state flags
        camEnabled: true,
        micEnabled: true,
        viewerMicEnabled: false,
        currentFacingMode: 'environment',

        // viewer helpers
        viewerCode: null,
        currentViewerId: null,
        streamDroppedByUser: false,
        streamCheckInterval: null,
        refreshTimeout: null,

        // ─── INIT ─────────────────────────────────────────────────────────────────

        init() {
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(console.error);
            }
        },

        showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        },

        // ─── SHARED CLEANUP ───────────────────────────────────────────────────────

        goHome() {
            this.streamDroppedByUser = true;
            clearInterval(this.streamCheckInterval);
            clearTimeout(this.refreshTimeout);

            if (this.localStream) {
                this.localStream.getTracks().forEach(t => t.stop());
                this.localStream = null;
            }
            if (this.viewerStream) {
                this.viewerStream.getTracks().forEach(t => t.stop());
                this.viewerStream = null;
            }
            if (this.viewerBackCall) {
                try { this.viewerBackCall.close(); } catch(e) {}
                this.viewerBackCall = null;
            }
            if (this.peer) {
                this.peer.destroy();
                this.peer = null;
            }
            this.conn = null;
            this.currentCall = null;
            this.currentViewerId = null;
            this.viewerMicEnabled = false;

            // reset viewer DOM
            document.getElementById('codeCard').style.display = 'block';
            document.getElementById('viewerVideoContainer').style.display = 'none';
            document.getElementById('connectingOverlay').classList.remove('visible');
            document.getElementById('droppedOverlay').classList.remove('visible');
            document.getElementById('unmuteBtn').style.display = 'none';
            document.getElementById('viewerVideo').srcObject = null;
            document.getElementById('liveDot').classList.remove('live');

            // reset streamer DOM
            document.getElementById('connectCard').style.display = 'block';
            document.getElementById('streamerVideoContainer').style.display = 'none';
            document.getElementById('connectCode').value = '';

            this.showScreen('homeScreen');
        },

        // ─── VIEWER ───────────────────────────────────────────────────────────────

        startViewing() {
            this.showScreen('viewingScreen');

            const code = Math.floor(1000 + Math.random() * 9000).toString();
            this.viewerCode = code;
            this.streamDroppedByUser = false;
            this.viewerMicEnabled = false;
            document.getElementById('viewerCode').innerText = code;
            this.camEnabled = true;
            this.micEnabled = true;
            this.updateButtonsUI();

            this.peer = new Peer(this.peerIdPrefix + code);

            this.peer.on('open', () => console.log('Viewer ready, code:', code));

            this.peer.on('connection', (conn) => {
                this.conn = conn;
                // show video area immediately (stream arrives via 'call' event below)
                document.getElementById('codeCard').style.display = 'none';
                document.getElementById('viewerVideoContainer').style.display = 'block';

                conn.on('data', (data) => this.handleViewerCommand(data));
                conn.on('close', () => {
                    if (!this.streamDroppedByUser) {
                        this._setLive(false);
                    }
                });
            });

            this.peer.on('call', (call) => {
                call.answer();
                call.on('stream', (remoteStream) => {
                    this._attachStream(remoteStream);
                    document.getElementById('connectingOverlay').classList.remove('visible');
                    clearTimeout(this.refreshTimeout);
                    const btn = document.getElementById('btnRefresh');
                    if (btn) btn.classList.remove('refreshing');
                });
                call.on('close', () => {
                    if (!this.streamDroppedByUser) this._setLive(false);
                });
                call.on('error', () => {
                    if (!this.streamDroppedByUser) this._setLive(false);
                });
            });

            this.peer.on('error', () => {
                if (!this.streamDroppedByUser) this._setLive(false);
            });
        },

        // attach a new remote stream to the video element
        _attachStream(remoteStream) {
            const video = document.getElementById('viewerVideo');
            video.srcObject = remoteStream;
            video.play().catch(() => {});
            document.getElementById('unmuteBtn').style.display = 'block';
            this._setLive(true);
            this.startStreamHealthCheck(remoteStream);
        },

        _setLive(isLive) {
            const dot = document.getElementById('liveDot');
            const dropped = document.getElementById('droppedOverlay');
            if (dot) isLive ? dot.classList.add('live') : dot.classList.remove('live');
            if (dropped) isLive ? dropped.classList.remove('visible') : dropped.classList.add('visible');
        },

        // Viewer presses ↺ — asks the streamer to re-send the stream
        requestStreamRefresh() {
            this.streamDroppedByUser = false;  // allow drop detection after refresh
            const btn = document.getElementById('btnRefresh');
            if (btn) btn.classList.add('refreshing');

            document.getElementById('droppedOverlay').classList.remove('visible');
            document.getElementById('connectingOverlay').classList.add('visible');

            clearTimeout(this.refreshTimeout);

            // if data channel is still open — just ask the streamer to re-call
            if (this.conn && this.conn.open) {
                this.conn.send({ type: 'requestRefresh' });
            } else {
                // connection lost entirely — re-establish peer connection first
                this._reconnectAsPeer();
                return;
            }

            // safety timeout: if no new stream arrives in 10s, show dropped again
            this.refreshTimeout = setTimeout(() => {
                document.getElementById('connectingOverlay').classList.remove('visible');
                if (btn) btn.classList.remove('refreshing');
                this._setLive(false);
            }, 10000);
        },

        // Re-register the same viewer Peer ID and wait for streamer to reconnect
        _reconnectAsPeer() {
            if (this.peer) {
                try { this.peer.destroy(); } catch(e) {}
                this.peer = null;
                this.conn = null;
                this.currentCall = null;
            }

            const code = this.viewerCode;
            this.peer = new Peer(this.peerIdPrefix + code);

            this.peer.on('open', () => {
                console.log('Viewer re-registered, code:', code);
            });

            this.peer.on('connection', (conn) => {
                this.conn = conn;
                conn.on('data', (data) => this.handleViewerCommand(data));
                conn.on('close', () => {
                    if (!this.streamDroppedByUser) this._setLive(false);
                });
            });

            this.peer.on('call', (call) => {
                call.answer();
                call.on('stream', (remoteStream) => {
                    this._attachStream(remoteStream);
                    document.getElementById('connectingOverlay').classList.remove('visible');
                    clearTimeout(this.refreshTimeout);
                    const btn = document.getElementById('btnRefresh');
                    if (btn) btn.classList.remove('refreshing');
                });
                call.on('close', () => {
                    if (!this.streamDroppedByUser) this._setLive(false);
                });
            });

            this.peer.on('error', () => {
                // same ID still in use on PeerJS server — wait and retry
                clearTimeout(this.refreshTimeout);
                this.refreshTimeout = setTimeout(() => {
                    document.getElementById('connectingOverlay').classList.remove('visible');
                    const btn = document.getElementById('btnRefresh');
                    if (btn) btn.classList.remove('refreshing');
                    this._setLive(false);
                }, 3000);
            });
        },

        // handle commands sent from streamer to viewer
        handleViewerCommand(data) {
            if (data.type === 'streamerMicOn') {
                if (this.viewerMicEnabled) this.stopViewerMic();
            }
        },

        // viewer mic
        async toggleViewerMic() {
            if (this.viewerMicEnabled) {
                this.stopViewerMic();
            } else {
                await this.startViewerMic();
            }
        },

        async startViewerMic() {
            try {
                this.viewerStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err) {
                alert('חובה לאשר גישה למיקרופון!');
                return;
            }
            if (this.peer && this.conn) {
                const backCall = this.peer.call(this.conn.peer, this.viewerStream);
                this.viewerBackCall = backCall;
            }
            this.viewerMicEnabled = true;
            if (this.conn) this.conn.send({ type: 'viewerMicOn' });
            this.updateButtonsUI();
        },

        stopViewerMic() {
            if (this.viewerStream) {
                this.viewerStream.getTracks().forEach(t => t.stop());
                this.viewerStream = null;
            }
            if (this.viewerBackCall) {
                try { this.viewerBackCall.close(); } catch(e) {}
                this.viewerBackCall = null;
            }
            this.viewerMicEnabled = false;
            if (this.conn) this.conn.send({ type: 'viewerMicOff' });
            this.updateButtonsUI();
        },

        unmuteVideo() {
            document.getElementById('viewerVideo').muted = false;
            document.getElementById('unmuteBtn').style.display = 'none';
        },

        startStreamHealthCheck(stream) {
            clearInterval(this.streamCheckInterval);
            this.streamCheckInterval = setInterval(() => {
                const tracks = stream.getVideoTracks();
                if (tracks.length === 0 || tracks[0].readyState === 'ended') {
                    if (!this.streamDroppedByUser) this._setLive(false);
                    clearInterval(this.streamCheckInterval);
                }
            }, 3000);
        },

        // ─── STREAMER ─────────────────────────────────────────────────────────────

        startStreaming() {
            this.showScreen('streamingScreen');
        },

        async connectToViewer() {
            const code = document.getElementById('connectCode').value;
            if (code.length !== 4) return;

            // prevent double-call if already connecting
            if (this.peer) return;

            try {
                this.localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: this.currentFacingMode },
                    audio: true
                });
                this.updateStreamerVideo();
            } catch (err) {
                alert('חובה לאשר גישה למצלמה ולמיקרופון!');
                return;
            }

            this.peer = new Peer();

            this.peer.on('open', () => {
                const viewerId = this.peerIdPrefix + code;
                let connected = false;

                this.conn = this.peer.connect(viewerId);

                // give PeerJS enough time — 8 seconds
                const connectionTimeout = setTimeout(() => {
                    if (!connected) {
                        alert('אין שיחה פעילה עם קוד כזה כרגע');
                        this.goHome();
                    }
                }, 8000);

                this.conn.on('open', () => {
                    connected = true;
                    clearTimeout(connectionTimeout);
                    this.currentViewerId = viewerId; // save for refresh use

                    document.getElementById('connectCard').style.display = 'none';
                    document.getElementById('streamerVideoContainer').style.display = 'block';

                    this.currentCall = this.peer.call(viewerId, this.localStream);

                    this.conn.on('data', (data) => this.handleRemoteCommand(data));
                    this.conn.on('close', () => {
                        alert('השידור הופסק על ידי הצופה');
                        this.goHome();
                    });
                });

                this.conn.on('error', () => {
                    clearTimeout(connectionTimeout);
                    alert('שגיאת חיבור');
                    this.goHome();
                });

                this.peer.on('error', () => {
                    clearTimeout(connectionTimeout);
                    if (!connected) {
                        alert('אין שיחה פעילה עם קוד כזה כרגע');
                        this.goHome();
                    }
                });

                // incoming call = viewer's microphone back-channel
                this.peer.on('call', (incomingCall) => {
                    incomingCall.answer();
                    incomingCall.on('stream', (viewerAudioStream) => {
                        let audioEl = document.getElementById('viewerAudioPlayback');
                        if (!audioEl) {
                            audioEl = document.createElement('audio');
                            audioEl.id = 'viewerAudioPlayback';
                            audioEl.autoplay = true;
                            document.body.appendChild(audioEl);
                        }
                        audioEl.srcObject = viewerAudioStream;
                    });
                    this.viewerBackCall = incomingCall;
                });

                // viewer re-connected after a drop — re-send the stream automatically
                this.peer.on('connection', (newConn) => {
                    // only handle if we already had a session (reconnect scenario)
                    if (!connected) return;
                    this.conn = newConn;
                    newConn.on('open', () => {
                        if (this.currentViewerId && this.localStream) {
                            if (this.currentCall) {
                                try { this.currentCall.close(); } catch(e) {}
                            }
                            this.currentCall = this.peer.call(this.currentViewerId, this.localStream);
                        }
                        newConn.on('data', (data) => this.handleRemoteCommand(data));
                        newConn.on('close', () => {
                            alert('השידור הופסק על ידי הצופה');
                            this.goHome();
                        });
                    });
                });
            });
        },

        updateStreamerVideo() {
            const video = document.getElementById('streamerVideo');
            video.srcObject = this.localStream;
            video.classList.toggle('rear-cam', this.currentFacingMode !== 'user');
        },

        // ─── REMOTE CONTROLS (viewer → streamer) ─────────────────────────────────

        remoteToggleCamera() {
            if (!this.conn) return;
            this.conn.send({ type: 'toggleVideo' });
            this.camEnabled = !this.camEnabled;
            this.updateButtonsUI();
        },

        remoteToggleMic() {
            if (!this.conn) return;
            this.micEnabled = !this.micEnabled;
            this.conn.send({ type: 'toggleAudio' });
            if (this.micEnabled) this.conn.send({ type: 'streamerMicOn' });
            this.updateButtonsUI();
        },

        remoteSwitchCamera() {
            if (this.conn) this.conn.send({ type: 'switchCamera' });
        },

        updateButtonsUI() {
            const btnCam       = document.getElementById('btnCam');
            const btnMic       = document.getElementById('btnMic');
            const btnViewerMic = document.getElementById('btnViewerMic');

            if (btnCam) {
                btnCam.className = this.camEnabled ? 'control-btn' : 'control-btn off';
                btnCam.innerText = this.camEnabled ? '📷' : '🚫';
            }
            if (btnMic) {
                btnMic.className = this.micEnabled ? 'control-btn' : 'control-btn off';
                btnMic.innerText = this.micEnabled ? '🎤' : '🔇';
            }
            if (btnViewerMic) {
                btnViewerMic.className = this.viewerMicEnabled ? 'control-btn talking' : 'control-btn';
                btnViewerMic.innerText = this.viewerMicEnabled ? '🎙️' : '🗣️';
            }
        },

        // ─── COMMAND HANDLER (streamer side) ─────────────────────────────────────

        async handleRemoteCommand(data) {
            if (data.type === 'toggleVideo') {
                this.camEnabled = !this.camEnabled;
                const track = this.localStream && this.localStream.getVideoTracks()[0];
                if (track) track.enabled = this.camEnabled;
            }

            if (data.type === 'toggleAudio') {
                this.micEnabled = !this.micEnabled;
                const track = this.localStream && this.localStream.getAudioTracks()[0];
                if (track) track.enabled = this.micEnabled;
            }

            if (data.type === 'switchCamera') {
                await this.performCameraSwitch();
            }

            if (data.type === 'viewerMicOn') {
                if (this.micEnabled) {
                    this.micEnabled = false;
                    const track = this.localStream && this.localStream.getAudioTracks()[0];
                    if (track) track.enabled = false;
                    this.updateButtonsUI();
                }
            }

            // viewer requests stream refresh — re-call with the current stream
            if (data.type === 'requestRefresh') {
                if (this.currentCall) {
                    try { this.currentCall.close(); } catch(e) {}
                }
                if (this.currentViewerId && this.localStream) {
                    this.currentCall = this.peer.call(this.currentViewerId, this.localStream);
                }
            }
        },

        async performCameraSwitch() {
            this.currentFacingMode = (this.currentFacingMode === 'user') ? 'environment' : 'user';
            this.localStream.getTracks().forEach(t => t.stop());

            try {
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: this.currentFacingMode },
                    audio: true
                });

                const newVideo = newStream.getVideoTracks()[0];
                const newAudio = newStream.getAudioTracks()[0];
                if (newAudio) newAudio.enabled = this.micEnabled;
                if (newVideo) newVideo.enabled = this.camEnabled;

                this.localStream = newStream;
                this.updateStreamerVideo();

                if (this.currentCall && this.currentCall.peerConnection) {
                    const senders = this.currentCall.peerConnection.getSenders();
                    const vs = senders.find(s => s.track && s.track.kind === 'video');
                    const as = senders.find(s => s.track && s.track.kind === 'audio');
                    if (vs) vs.replaceTrack(newVideo);
                    if (as) as.replaceTrack(newAudio);
                }
            } catch (err) {
                console.error('Camera switch error:', err);
                alert('לא ניתן להחליף מצלמה (אולי היא בשימוש?)');
            }
        },

        // ─── DISCONNECT ───────────────────────────────────────────────────────────

        disconnect() {
            this.streamDroppedByUser = true;
            clearInterval(this.streamCheckInterval);
            clearTimeout(this.refreshTimeout);

            if (this.localStream) {
                this.localStream.getTracks().forEach(t => t.stop());
                this.localStream = null;
            }
            if (this.viewerStream) {
                this.viewerStream.getTracks().forEach(t => t.stop());
                this.viewerStream = null;
            }
            if (this.viewerBackCall) {
                try { this.viewerBackCall.close(); } catch(e) {}
                this.viewerBackCall = null;
            }
            if (this.peer) {
                this.peer.destroy();
                this.peer = null;
            }
            this.conn = null;
            this.currentCall = null;
            this.currentViewerId = null;
            window.location.reload();
        }
    };

    app.init();
</script>
</body>
</html>
